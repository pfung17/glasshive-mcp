# Render blueprint — deploys the HTTP MCP server (Dockerfile) as an always-on
# web service. In Render: New > Blueprint, connect this repo, then fill in the
# two secret values when prompted.
#
# After deploy you'll get a public URL like https://glasshive-mcp.onrender.com
# — your MCP endpoint is that URL + /mcp, which is what you paste into the
# Smithery "Publish an MCP Server" wizard.
services:
  - type: web
    name: glasshive-mcp
    runtime: docker
    dockerfilePath: ./Dockerfile
    # "free" spins down after ~15 min idle (slow cold start on first hit).
    # Bump to "starter" (~$7/mo) to keep it always warm.
    plan: free
    healthCheckPath: /health
    envVars:
      # GlassHive partner API key — stays on YOUR host, never in Smithery.
      - key: GLASSHIVE_API_KEY
        sync: false
      # Shared secret the gateway must send as `Authorization: Bearer <token>`.
      # Generate a long random value (e.g. `openssl rand -hex 32`).
      - key: MCP_AUTH_TOKEN
        sync: false
